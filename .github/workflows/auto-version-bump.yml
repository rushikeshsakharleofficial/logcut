name: Auto version bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'VERSION.txt'
      - 'packages/**'

permissions:
  contents: write

jobs:
  bump:
    name: Bump patch version
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'Bump version to')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Bump patch version
        id: bump
        run: |
          NEW_VERSION=$(go run ./cmd/versionbump)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION.txt nfpm.yaml man/logcut.8 cmd/devtool/main.go
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
            git push
          fi
