name: Build packages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build logcut packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: make build

      - name: Build DEB package with nFPM Go module
        run: make deb

      - name: Build RPM package with nFPM Go module
        run: make rpm

      - name: Generate checksums
        run: make checksums

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logcut-linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS

      - name: Commit generated packages to repository
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p packages
          cp dist/*.deb packages/
          cp dist/*.rpm packages/
          cp dist/SHA256SUMS packages/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/
          if git diff --cached --quiet; then
            echo "No package changes to commit"
          else
            git commit -m "Add generated packages for logcut 1.0.2 [skip ci]"
            git push
          fi

      - name: Upload packages to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
