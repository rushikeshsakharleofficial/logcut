name: Build packages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build:
    name: Build logcut packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install nFPM using Go
        run: make tools

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build binary
        run: make build

      - name: Build DEB package with nFPM
        run: make deb

      - name: Build RPM package with nFPM
        run: make rpm

      - name: Generate checksums
        run: make checksums

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logcut-linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS

      - name: Upload packages to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
