name: logcut
arch: amd64
platform: linux
version: 1.0.11
release: 1
section: admin
priority: optional
maintainer: Rushikesh Sakharle <rishiananya123@gmail.com>
description: |
  Emergency log compaction and rotation tool for Linux servers.
  logcut streams old data from huge active log files, optionally gzip-compresses it,
  and frees matching source blocks using Linux hole punching without restarting the app.
license: MIT
homepage: https://github.com/rushikeshsakharleofficial/logcut
contents:
  - src: ./build/logcut
    dst: /usr/local/bin/logcut
    file_info:
      mode: 0755
  - src: ./man/logcut.8
    dst: /usr/share/man/man8/logcut.8
    file_info:
      mode: 0644
  - src: ./README.md
    dst: /usr/share/doc/logcut/README.md
    file_info:
      mode: 0644
  - src: ./MANUAL.md
    dst: /usr/share/doc/logcut/MANUAL.md
    file_info:
      mode: 0644
  - src: ./INSTALL.md
    dst: /usr/share/doc/logcut/INSTALL.md
    file_info:
      mode: 0644
  - src: ./docs/architecture.md
    dst: /usr/share/doc/logcut/architecture.md
    file_info:
      mode: 0644
  - src: ./examples/emergency.md
    dst: /usr/share/doc/logcut/examples/emergency.md
    file_info:
      mode: 0644
  - src: ./LICENSE
    dst: /usr/share/doc/logcut/LICENSE
    file_info:
      mode: 0644
  - dst: /etc/logcut
    type: dir
    file_info:
      mode: 0755
  - dst: /var/lib/logcut
    type: dir
    file_info:
      mode: 0755
  - dst: /var/log
    type: dir
    file_info:
      mode: 0755
  - dst: /var/lock
    type: dir
    file_info:
      mode: 0755
